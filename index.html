<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Severin Mortis - Deathweaver</title>
    <!-- Google Fonts for Fantasy Style -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <!-- Screenshot Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #121212;
            --panel-bg: rgba(30, 30, 30, 0.95);
            --border-gold: #8a734e;
            --magic-green: #4ade80;
            --text-main: #e0e0e0;
            --ink-black: #0a0a0a;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        /* Container that we will take a screenshot of */
        #capture-area {
            width: 1000px;
            background: #1a1a1a;
            border: 4px solid var(--border-gold);
            box-shadow: 0 0 50px rgba(0,0,0,1);
            margin-top: 20px;
        }

        /* Banner Header */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 350px;
            overflow: hidden;
            border-bottom: 4px solid var(--border-gold);
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            filter: brightness(0.7);
        }

        .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, var(--ink-black));
            padding: 40px;
        }

        .hero-overlay h1 {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            margin: 0;
            color: white;
            text-shadow: 2px 2px 10px black;
        }

        /* Date Bar */
        .date-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: #2a2a2a;
            padding: 15px 40px;
            border-bottom: 2px solid var(--border-gold);
            font-family: 'Cinzel', serif;
        }

        .date-item span { color: var(--border-gold); margin-right: 10px; }

        /* Main Grid */
        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
            padding: 30px;
        }

        .panel {
            background: var(--panel-bg);
            border: 2px solid #3d3d3d;
            border-radius: 8px;
            padding: 20px;
        }

        h2 {
            font-family: 'Cinzel', serif;
            color: var(--border-gold);
            border-bottom: 1px solid var(--border-gold);
            margin-top: 0;
            font-size: 1.5rem;
        }

        /* Stats & Attributes */
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.4rem;
        }

        .stat-box {
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 5px;
            flex: 1;
            margin: 0 5px;
        }

        input[type="number"], input[type="text"] {
            background: transparent;
            border: none;
            border-bottom: 1px dashed var(--border-gold);
            color: white;
            font-size: 1.4rem;
            text-align: center;
            width: 60px;
        }

        /* HP Control */
        .hp-bar {
            font-size: 2.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 10px 0;
        }

        .btn-round {
            background: var(--border-gold);
            border: none;
            color: black;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            font-weight: bold;
        }

        /* Spell Points */
        .crystal-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .crystal {
            appearance: none;
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-gold);
            transform: rotate(45deg);
            cursor: pointer;
        }

        .crystal:checked {
            background: var(--magic-green);
            box-shadow: 0 0 20px var(--magic-green);
        }

        /* Notes & Textareas */
        textarea {
            width: 100%;
            height: 180px;
            background: rgba(0,0,0,0.4);
            color: #ccc;
            border: 1px solid #444;
            padding: 15px;
            font-size: 1.1rem;
            font-family: inherit;
            box-sizing: border-box;
            border-radius: 5px;
        }

        /* Action Footer */
        .footer-actions {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            background: #111;
        }

        .btn-large {
            padding: 15px 30px;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            background: var(--border-gold);
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        .btn-large:hover { background: #b09467; }

        .game-date-input { width: 300px !important; text-align: left !important; }
    </style>
</head>
<body>

<div id="capture-area">
    <!-- HERO BANNER -->
    <div class="hero-banner">
        <img src="https://i.imgur.com/8Q8p8R4.png" class="hero-image" alt="Character Art">
        <div class="hero-overlay">
            <h1>SEVERIN MORTIS</h1>
            <div style="color: var(--magic-green); font-size: 1.5rem; font-family: 'Cinzel';">
                Level 1 Human Deathweaver
            </div>
        </div>
    </div>

    <!-- DATE BAR -->
    <div class="date-bar">
        <div class="date-item">
            <span>SYSTEM TIME:</span> <span id="sys-clock" style="color: white;">--:--</span>
        </div>
        <div class="date-item" style="text-align: right;">
            <span>GAME DATE:</span> 
            <input type="text" id="game-date" class="game-date-input" value="Year 42, Day 112, Twilight">
            <button class="btn-round" style="width: auto; padding: 0 10px; border-radius: 5px; font-size: 0.8rem;" onclick="addGameDay()">+ DAY</button>
        </div>
    </div>

    <div class="main-content">
        <!-- LEFT COLUMN -->
        <div class="column">
            <div class="panel" style="margin-bottom: 20px;">
                <h2>Combat Stats</h2>
                <div class="hp-bar">
                    <button class="btn-round" onclick="changeHP(-1)">-</button>
                    <span id="currHP">10</span> / <span id="maxHP">10</span>
                    <button class="btn-round" onclick="changeHP(1)">+</button>
                </div>
                <div class="stat-row">
                    <div class="stat-box">ATK<br><input type="text" id="atk" value="+3"></div>
                    <div class="stat-box">DEF<br><input type="text" id="def" value="10"></div>
                    <div class="stat-box">DMG<br><input type="text" id="dmg" value="+2"></div>
                </div>
            </div>

            <div class="panel" style="margin-bottom: 20px;">
                <h2>Attributes</h2>
                <div class="stat-row"><span>STR</span> <input type="number" id="str" value="0"></div>
                <div class="stat-row"><span>DEX</span> <input type="number" id="dex" value="-1"></div>
                <div class="stat-row"><span>CON</span> <input type="number" id="con" value="1"></div>
                <div class="stat-row"><span>INT</span> <input type="number" id="int" value="2"></div>
                <div class="stat-row"><span>WIS</span> <input type="number" id="wis" value="0"></div>
                <div class="stat-row"><span>CHA</span> <input type="number" id="cha" value="-2"></div>
            </div>

            <div class="panel">
                <h2>Spell Points</h2>
                <div class="crystal-group">
                    <input type="checkbox" id="sp1" class="crystal">
                    <input type="checkbox" id="sp2" class="crystal">
                </div>
                <p style="text-align: center; font-size: 0.9rem; color: #888; margin-top: 15px;">(Regain on Rest)</p>
            </div>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="column">
            <div class="panel" style="margin-bottom: 20px; display: flex; justify-content: space-around;">
                <div class="stat-box">GOLD<br><input type="number" id="gold" value="0"></div>
                <div class="stat-box">NOTORIETY<br><input type="number" id="noto" value="0"></div>
                <div class="stat-box">MINIONS<br><input type="number" id="minions" value="0"></div>
            </div>

            <div class="panel" style="margin-bottom: 20px;">
                <h2>Quest Notes</h2>
                <textarea id="notes" placeholder="Current objectives, spell effectiveness, etc..."></textarea>
            </div>

            <div class="panel">
                <h2>Loot & Treasures</h2>
                <textarea id="loot" style="height: 120px;" placeholder="Items found in the Dark Citadel..."></textarea>
            </div>
        </div>
    </div>

    <!-- FOOTER ACTIONS -->
    <div class="footer-actions">
        <button class="btn-large" style="background: #444; color: white;" onclick="resetStats()">RESET CHARACTER</button>
        <button class="btn-large" onclick="takeScreenshot()">📸 SHARE / SAVE SCREENSHOT</button>
    </div>
</div>

<script>
    // --- LIVE SYSTEM CLOCK ---
    function updateClock() {
        const now = new Date();
        document.getElementById('sys-clock').innerText = now.toLocaleString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    // --- GAME DATE INCREMENT ---
    function addGameDay() {
        // Simple logic to increment a number inside the string
        let dateStr = document.getElementById('game-date').value;
        document.getElementById('game-date').value = dateStr.replace(/\d+/, (n) => parseInt(n) + 1);
        saveAll();
    }

    // --- HP TRACKER ---
    function changeHP(amt) {
        let cur = parseInt(document.getElementById('currHP').innerText);
        let max = parseInt(document.getElementById('maxHP').innerText);
        cur = Math.min(max, Math.max(0, cur + amt));
        document.getElementById('currHP').innerText = cur;
        saveAll();
    }

    // --- SCREENSHOT FUNCTION ---
    function takeScreenshot() {
        const area = document.getElementById('capture-area');
        html2canvas(area, { backgroundColor: '#121212' }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Severin_Mortis_Progress.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    // --- SAVE / LOAD SYSTEM ---
    const fieldIds = [
        'game-date', 'atk', 'def', 'dmg', 'str', 'dex', 'con', 
        'int', 'wis', 'cha', 'sp1', 'sp2', 'gold', 'noto', 'minions', 'notes', 'loot'
    ];

    function saveAll() {
        const data = {
            hp: document.getElementById('currHP').innerText
        };
        fieldIds.forEach(id => {
            const el = document.getElementById(id);
            data[id] = el.type === 'checkbox' ? el.checked : el.value;
        });
        localStorage.setItem('severin_hd_save', JSON.stringify(data));
    }

    function loadAll() {
        const saved = localStorage.getItem('severin_hd_save');
        if (!saved) return;
        const data = JSON.parse(saved);
        document.getElementById('currHP').innerText = data.hp || 10;
        fieldIds.forEach(id => {
            const el = document.getElementById(id);
            if (data[id] !== undefined) {
                if (el.type === 'checkbox') el.checked = data[id];
                else el.value = data[id];
            }
        });
    }

    function resetStats() {
        if(confirm("Are you sure? This will wipe your progress!")) {
            localStorage.removeItem('severin_hd_save');
            location.reload();
        }
    }

    // Initialize
    window.onload = loadAll;
    document.getElementById('capture-area').addEventListener('input', saveAll);
</script>

</body>
</html>
